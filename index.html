<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="SmartCalc PRO – a feature-rich calculator with graphing, unit conversion, equation solver, and formula library.">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%237c6af7' width='192' height='192' rx='24'/%3E%3Ctext x='96' y='120' font-size='80' text-anchor='middle' fill='white' font-family='Arial'%3E∑%3C/text%3E%3C/svg%3E">
<title>SmartCalc Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#111118; --surface2:#1a1a24; --surface3:#222230;
  --border:#2a2a3a; --border2:#3a3a50;
  --accent:#7c6af7; --accent2:#f76a8f; --accent3:#6af7c8; --accent4:#f7c46a;
  --text:#e8e8f0; --text-dim:#6b6b88; --text-muted:#3a3a52;
  --syn-num:#6af7c8; --syn-op:#f7c46a; --syn-fn:#c9a6f7; --syn-paren:#f76a8f;
  --df:'Syne',sans-serif; --mf:'DM Mono',monospace;
  --r:14px; --rs:8px; --t:0.15s cubic-bezier(.4,0,.2,1);
  --shadow:0 8px 40px rgba(0,0,0,.5); --glow:0 0 30px rgba(124,106,247,.12);
}
[data-theme="light"]{
  --bg:#f0f0f8; --surface:#fff; --surface2:#f5f5ff; --surface3:#eeeeff;
  --border:#ddddf0; --border2:#c8c8e0;
  --text:#1a1a2e; --text-dim:#5050a0; --text-muted:#b0b0cc;
  --shadow:0 8px 40px rgba(124,106,247,.1); --glow:0 0 30px rgba(124,106,247,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--df);background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:1rem 0.75rem 4rem;
  transition:background var(--t),color var(--t);-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.35}
.shell{width:100%;max-width:520px;position:relative;z-index:1;display:flex;flex-direction:column;gap:.75rem}

/* HEADER */
header{display:flex;justify-content:space-between;align-items:center;padding:.25rem 0}
.brand{font-size:1.05rem;font-weight:800;letter-spacing:-.02em}
.brand span{color:var(--accent)}
.hdr-acts{display:flex;gap:.4rem}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--surface);
  color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.9rem;transition:all var(--t);flex-shrink:0}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn:active{transform:scale(.9)}

/* TABS */
.tabs-outer{overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.tabs-outer::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:.4rem;min-width:max-content}
.tab{padding:.4rem .9rem;border-radius:50px;border:1px solid var(--border);background:transparent;
  color:var(--text-dim);font-family:var(--df);font-size:.75rem;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:all var(--t);letter-spacing:.01em}
.tab:hover{border-color:var(--accent);color:var(--accent)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 18px rgba(124,106,247,.35)}

/* MEMORY BAR */
.mem-bar{display:flex;gap:.4rem;align-items:center;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rs);padding:.5rem .75rem;flex-wrap:wrap}
.mem-label{font-family:var(--mf);font-size:.7rem;color:var(--text-muted);margin-right:.25rem;flex-shrink:0}
.mem-val{font-family:var(--mf);font-size:.75rem;color:var(--accent3);font-weight:500;margin-left:auto;flex-shrink:0}
.mem-btn{padding:.25rem .55rem;border-radius:6px;border:1px solid var(--border);background:var(--surface2);
  color:var(--text-dim);font-family:var(--mf);font-size:.72rem;font-weight:500;cursor:pointer;transition:all var(--t)}
.mem-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,106,247,.08)}
.mem-btn:active{transform:scale(.92)}
.mem-btn.mc:hover{border-color:var(--accent2);color:var(--accent2)}

/* DISPLAY */
.display-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:1.1rem 1.25rem 1rem;box-shadow:var(--shadow),var(--glow);position:relative;overflow:hidden}
.display-card::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;
  background:radial-gradient(circle,rgba(124,106,247,.07) 0%,transparent 70%);pointer-events:none}

/* MULTI-LINE EDITOR — clean single-layer approach, no overlay tricks */
.expr-editor-wrap{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.6rem;position:relative}
.expr-textarea{width:100%;min-height:52px;max-height:110px;
  border:1px solid var(--border2);border-radius:var(--rs);padding:.5rem .75rem;
  font-family:var(--mf);font-size:.88rem;color:var(--text);caret-color:var(--accent3);
  resize:none;outline:none;line-height:1.5;overflow-y:auto;scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;transition:border-color var(--t);
  background:var(--surface2);}
.expr-textarea:focus{border-color:var(--accent)}

/* syntax colors */
.syn-num{color:var(--syn-num)} .syn-op{color:var(--syn-op)}
.syn-fn{color:var(--syn-fn)} .syn-paren{color:var(--syn-paren)}
.syn-def{color:var(--text)}

/* AUTOCOMPLETE */
.autocomplete{position:absolute;top:100%;left:0;right:0;background:var(--surface3);
  border:1px solid var(--accent);border-radius:var(--rs);z-index:50;overflow:hidden;margin-top:2px;
  box-shadow:0 8px 24px rgba(0,0,0,.4)}
.ac-item{padding:.45rem .75rem;font-family:var(--mf);font-size:.8rem;color:var(--text-dim);
  cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background var(--t)}
.ac-item:hover,.ac-item.selected{background:rgba(124,106,247,.15);color:var(--accent)}
.ac-item .ac-hint{font-size:.68rem;color:var(--text-muted)}

/* RESULT DISPLAY */
.display-value{font-family:var(--mf);font-size:2.4rem;font-weight:500;text-align:right;
  line-height:1;color:var(--text);word-break:break-all;transition:all .2s;letter-spacing:-.02em}
.display-value.error{color:var(--accent2);font-size:1.3rem}
.display-value.animate{animation:flash .18s ease}
@keyframes flash{0%{opacity:.3;transform:scale(.97)}100%{opacity:1;transform:scale(1)}}
.display-reasoning{font-family:var(--mf);font-size:.7rem;color:var(--accent);margin-top:.5rem;
  opacity:.8;letter-spacing:.01em;word-break:break-all}
.paren-hint{font-family:var(--mf);font-size:.68rem;color:var(--accent2);margin-top:.25rem}
.validation-msg{font-family:var(--mf);font-size:.68rem;margin-top:.2rem;min-height:1em}
.validation-msg.ok{color:var(--accent3)} .validation-msg.err{color:var(--accent2)} .validation-msg.warn{color:var(--accent4)}

/* NUMPAD */
.numpad-grid{display:grid;gap:.5rem}
.numpad-grid.g4{grid-template-columns:repeat(4,1fr)}
.numpad-grid.g5{grid-template-columns:repeat(5,1fr)}
.key{height:54px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);
  color:var(--text);font-family:var(--mf);font-size:.95rem;font-weight:400;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all var(--t);
  user-select:none;-webkit-tap-highlight-color:transparent;outline:none;position:relative;overflow:hidden}
.key::after{content:'';position:absolute;inset:0;background:var(--accent);opacity:0;transition:opacity .1s;border-radius:inherit}
.key:active::after{opacity:.12}
.key:hover{border-color:var(--border2);background:var(--surface2)}
.key:focus-visible{border-color:var(--accent);box-shadow:0 0 0 2px rgba(124,106,247,.3)}
.key.op{color:var(--accent);border-color:rgba(124,106,247,.2);background:rgba(124,106,247,.04);font-size:1.05rem}
.key.op:hover{background:rgba(124,106,247,.1)}
.key.eq{background:var(--accent);border-color:var(--accent);color:#fff;font-size:1.2rem;box-shadow:0 4px 18px rgba(124,106,247,.35)}
.key.eq:hover{background:#9180ff}
.key.clear{color:var(--accent2);border-color:rgba(247,106,143,.2);background:rgba(247,106,143,.04)}
.key.clear:hover{background:rgba(247,106,143,.1)}
.key.fn{color:var(--syn-fn);border-color:rgba(201,166,247,.15);background:rgba(201,166,247,.04);font-size:.72rem;font-weight:500}
.key.fn:hover{background:rgba(201,166,247,.1)}
.key.mem-k{color:var(--accent3);border-color:rgba(106,247,200,.15);background:rgba(106,247,200,.04);font-size:.78rem}
.key.mem-k:hover{background:rgba(106,247,200,.1)}
.key.span2{grid-column:span 2}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:1.1rem 1.25rem;box-shadow:var(--shadow)}
.card-title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:.9rem}

/* UTIL FORMS */
.field{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.7rem}
.field label{font-family:var(--mf);font-size:.72rem;color:var(--text-dim);letter-spacing:.04em}
.field input,.field select{font-family:var(--mf);font-size:.95rem;background:var(--surface2);
  border:1px solid var(--border);border-radius:var(--rs);color:var(--text);padding:.55rem .8rem;
  outline:none;transition:border-color var(--t);width:100%;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:var(--surface2)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem}

/* RESULT BOX */
.res-box{padding:.9rem 1rem;background:linear-gradient(135deg,rgba(124,106,247,.07),rgba(106,247,200,.04));
  border:1px solid rgba(124,106,247,.2);border-radius:var(--rs);margin-top:.25rem}
.res-num{font-family:var(--mf);font-size:1.8rem;font-weight:500;color:var(--text);letter-spacing:-.02em}
.res-lbl{font-size:.72rem;color:var(--text-dim);margin-top:.15rem}
.res-formula{font-family:var(--mf);font-size:.67rem;color:var(--accent);margin-top:.4rem;opacity:.85;word-break:break-all}
.res-extra{font-family:var(--mf);font-size:.7rem;color:var(--text-dim);margin-top:.3rem}

/* GRAPH CANVAS */
.graph-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);
  overflow:hidden;position:relative;margin-top:.5rem;height:260px}
canvas#graph-canvas{display:block;width:100%;touch-action:none;cursor:grab}
canvas#graph-canvas:active{cursor:grabbing}
.graph-controls{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-top:.5rem}
.graph-controls input{flex:1;min-width:120px;font-family:var(--mf);font-size:.85rem;
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);
  color:var(--text);padding:.45rem .75rem;outline:none}
.graph-controls input:focus{border-color:var(--accent)}
.graph-btn{padding:.45rem .9rem;border-radius:var(--rs);border:1px solid var(--border);
  background:var(--surface2);color:var(--text-dim);font-family:var(--mf);font-size:.75rem;cursor:pointer;transition:all var(--t)}
.graph-btn:hover{border-color:var(--accent);color:var(--accent)}
.graph-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.graph-info{font-family:var(--mf);font-size:.68rem;color:var(--text-dim);margin-top:.4rem;text-align:center}

/* FORMULA LIBRARY */
.formula-cats{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.75rem}
.fcat-btn{padding:.3rem .7rem;border-radius:50px;border:1px solid var(--border);background:transparent;
  color:var(--text-dim);font-family:var(--df);font-size:.72rem;font-weight:600;cursor:pointer;transition:all var(--t)}
.fcat-btn:hover{border-color:var(--accent);color:var(--accent)}
.fcat-btn.active{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.formula-grid{display:flex;flex-direction:column;gap:.5rem;max-height:320px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.formula-card{padding:.75rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);
  cursor:pointer;transition:all var(--t)}
.formula-card:hover{border-color:var(--accent);background:rgba(124,106,247,.06)}
.formula-card .fc-name{font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:.25rem}
.formula-card .fc-expr{font-family:var(--mf);font-size:.72rem;color:var(--accent);margin-bottom:.3rem}
.formula-card .fc-desc{font-size:.7rem;color:var(--text-dim)}
.formula-fields{display:flex;flex-direction:column;gap:.5rem;margin-top:.75rem;padding-top:.75rem;
  border-top:1px solid var(--border)}

/* EQUATION SOLVER */
.eq-type-tabs{display:flex;gap:.4rem;margin-bottom:.75rem;flex-wrap:wrap}
.eq-tab{padding:.3rem .7rem;border-radius:50px;border:1px solid var(--border);background:transparent;
  color:var(--text-dim);font-family:var(--df);font-size:.72rem;font-weight:600;cursor:pointer;transition:all var(--t)}
.eq-tab:hover{border-color:var(--accent3);color:var(--accent3)}
.eq-tab.active{background:rgba(106,247,200,.1);border-color:var(--accent3);color:var(--accent3)}

/* UNIT CONVERSION */
.unit-cats{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.75rem}
.ucat-btn{padding:.28rem .65rem;border-radius:50px;border:1px solid var(--border);background:transparent;
  color:var(--text-dim);font-family:var(--df);font-size:.7rem;font-weight:600;cursor:pointer;transition:all var(--t)}
.ucat-btn:hover{border-color:var(--accent4);color:var(--accent4)}
.ucat-btn.active{background:rgba(247,196,106,.1);border-color:var(--accent4);color:var(--accent4)}
.swap-btn{padding:.55rem .9rem;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--rs);color:var(--text-dim);cursor:pointer;font-size:1.1rem;transition:all var(--t)}
.swap-btn:hover{border-color:var(--accent4);color:var(--accent4);transform:rotate(180deg)}

/* HISTORY */
.history-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:1rem 1.25rem;box-shadow:var(--shadow)}
.hist-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem}
.sec-lbl{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted)}
.clear-btn{font-size:.68rem;background:none;border:none;color:var(--text-muted);cursor:pointer;font-family:var(--df);transition:color var(--t)}
.clear-btn:hover{color:var(--accent2)}
.hist-list{display:flex;flex-direction:column;gap:.35rem;max-height:150px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:.45rem .65rem;
  border-radius:7px;background:var(--surface2);border:1px solid transparent;cursor:pointer;transition:all var(--t)}
.hist-item:hover{border-color:var(--border)}
.hi-expr{font-family:var(--mf);font-size:.75rem;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:65%}
.hi-val{font-family:var(--mf);font-size:.8rem;color:var(--text);font-weight:500;flex-shrink:0}
.hist-empty{font-size:.75rem;color:var(--text-muted);font-family:var(--mf);text-align:center;padding:.85rem}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface3);border:1px solid var(--accent);color:var(--text);padding:.55rem 1.2rem;
  border-radius:50px;font-size:.78rem;font-weight:600;opacity:0;transition:all .3s;
  pointer-events:none;z-index:200;white-space:nowrap;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.6rem}
.stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:.6rem .75rem}
.stat-lbl{font-size:.65rem;color:var(--text-muted);font-family:var(--mf);margin-bottom:.2rem;text-transform:uppercase;letter-spacing:.06em}
.stat-val{font-family:var(--mf);font-size:.95rem;color:var(--text);font-weight:500}

/* PWA install prompt */
.pwa-banner{display:none;align-items:center;gap:.75rem;background:var(--surface);border:1px solid var(--accent);
  border-radius:var(--r);padding:.75rem 1rem;font-size:.78rem;color:var(--text-dim)}
.pwa-banner.visible{display:flex}
.pwa-banner button{padding:.35rem .75rem;border-radius:var(--rs);border:none;background:var(--accent);
  color:#fff;font-family:var(--df);font-size:.75rem;font-weight:700;cursor:pointer;flex-shrink:0}

@media(min-width:480px){.key{height:60px} .display-value{font-size:2.8rem}}
</style>
</head>
<body data-theme="dark">
<div class="shell" id="app">
  <header>
    <div class="brand" style="display: flex; align-items: baseline; gap: 6px;">Smart<span>Calc</span> Pro <span style="font-style: italic; font-size: 0.7rem; color: var(--text-dim); font-weight: 400; opacity: 0.8;">by brothers</span></div>
    <div class="hdr-acts">
      <button class="icon-btn" data-action="toggle-theme" title="Toggle theme">🌓</button>
      <button class="icon-btn" data-action="copy-result" title="Copy result">📋</button>
    </div>
  </header>
  <nav class="tabs-outer"><div class="tabs" id="nav"></div></nav>
  <div class="pwa-banner" id="pwa-banner">
    <span>📲 Add SmartCalc PRO to your home screen</span>
    <button id="pwa-install-btn">Install</button>
    <button onclick="document.getElementById('pwa-banner').classList.remove('visible')" style="background:transparent;border:1px solid var(--border);color:var(--text-dim)">✕</button>
  </div>
  <div id="main-area"></div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
const App = (() => {

// ══════════════════════════════════════════════
// MATH ENGINE (Shunting-yard, no eval)
// ══════════════════════════════════════════════
const ME = {
  FNS: {
    sqrt:Math.sqrt, cbrt:Math.cbrt,
    sin:x=>Math.sin(x*Math.PI/180), cos:x=>Math.cos(x*Math.PI/180),
    tan:x=>Math.tan(x*Math.PI/180),
    asin:x=>Math.asin(x)*180/Math.PI, acos:x=>Math.acos(x)*180/Math.PI,
    atan:x=>Math.atan(x)*180/Math.PI,
    asinr:Math.asin, acosr:Math.acos, atanr:Math.atan,
    sinr:Math.sin, cosr:Math.cos, tanr:Math.tan,
    log:Math.log10, ln:Math.log, log2:Math.log2,
    abs:Math.abs, ceil:Math.ceil, floor:Math.floor,
    round:Math.round, exp:Math.exp,
    fact:n=>{if(n<0||!Number.isInteger(n))return NaN;if(n>170)return Infinity;let r=1;for(let i=2;i<=n;i++)r*=i;return r},
    sign:Math.sign, trunc:Math.trunc,
    mod:(a,b)=>b===0?NaN:a%b
  },
  PREC:{'+':1,'-':1,'*':2,'/':2,'^':3},
  RASSO:new Set(['^']),
  tokenise(expr){
    const toks=[]; let i=0;
    const s=expr.replace(/\s+/g,'').replace(/π/g,'pi').replace(/×/g,'*').replace(/÷/g,'/');
    while(i<s.length){
      const m=s.slice(i).match(/^(sqrt|cbrt|sinr|cosr|tanr|asinr|acosr|atanr|asin|acos|atan|sin|cos|tan|log2|log|ln|abs|ceil|floor|round|exp|fact|sign|trunc)/i);
      if(m){toks.push({t:'fn',v:m[0].toLowerCase()});i+=m[0].length;continue}
      const nm=s.slice(i).match(/^(pi|e|x)\b/i);
      if(nm){toks.push({t:'const',v:nm[0].toLowerCase()});i+=nm[0].length;continue}
      const dm=s.slice(i).match(/^\d+(\.\d+)?([eE][+-]?\d+)?/);
      if(dm){toks.push({t:'num',v:parseFloat(dm[0])});i+=dm[0].length;continue}
      if('+-*/^%()'.includes(s[i])){toks.push({t:'op',v:s[i]});i++;continue}
      i++;
    }
    // Convert postfix % to /100 (percent operator)
    const final=[];
    toks.forEach((tok,i)=>{
      if(tok.t==='op'&&tok.v==='%'){
        const prev=final[final.length-1];
        const next=toks[i+1];
        // % is postfix if previous is a value and next is not a value
        const prevIsVal=prev&&(prev.t==='num'||prev.t==='const'||(prev.t==='op'&&prev.v===')'));
        const nextIsVal=next&&(next.t==='num'||next.t==='const'||next.t==='fn'||(next.t==='op'&&next.v==='('));
        if(prevIsVal&&!nextIsVal){
          // Postfix percent: convert to /100
          final.push({t:'op',v:'/'});
          final.push({t:'num',v:100});
        } else {
          // Binary % - keep as-is for now (will be treated as modulo)
          // Or we could push an error token here
          final.push(tok);
        }
      } else {
        final.push(tok);
      }
    });
    return final;
  },
  evaluate(expr, xVal=null){
    if(!expr.trim())return{result:0,error:null};
    try{
      const raw=this.tokenise(expr);

      // ── Implicit function parens: sin x / sinx / sin2x → sin(x) / sin(x) / sin(2x)
      // When a fn token is NOT followed by '(', wrap the next atom in parens.
      const withParens=[];
      for(let i=0;i<raw.length;i++){
        const tok=raw[i];
        if(tok.t==='fn' && !(raw[i+1]&&raw[i+1].t==='op'&&raw[i+1].v==='(')){
          // Collect the argument: one atom (num/const) optionally preceded by unary minus,
          // or a parenthesised group already handled later.
          withParens.push(tok);
          withParens.push({t:'op',v:'('});
          // consume optional unary sign
          if(raw[i+1]&&raw[i+1].t==='op'&&(raw[i+1].v==='-'||raw[i+1].v==='+'))
            withParens.push(raw[++i]);
          // consume one atom
          if(i+1<raw.length&&(raw[i+1].t==='num'||raw[i+1].t==='const'))
            withParens.push(raw[++i]);
          withParens.push({t:'op',v:')'});
        } else {
          withParens.push(tok);
        }
      }

      // insert implicit multiply
      const toks=[];
      withParens.forEach((tok,i)=>{
        toks.push(tok);
        const next=withParens[i+1];
        if(!next)return;
        const lIsVal=tok.t==='num'||tok.t==='const'||(tok.t==='op'&&tok.v===')');
        const rIsVal=next.t==='fn'||next.t==='const'||next.t==='num'||(next.t==='op'&&next.v==='(');
        if(lIsVal&&rIsVal)toks.push({t:'op',v:'*'});
      });
      // handle unary minus/plus
      const proc=[];
      toks.forEach((tok)=>{
        if(tok.t==='op'&&(tok.v==='-'||tok.v==='+')){
          const prev=proc[proc.length-1];
          if(!prev||(prev.t==='op'&&prev.v!==')')){
            if(tok.v==='-')proc.push({t:'num',v:0});
            else return;
          }
        }
        proc.push(tok);
      });
      const outQ=[]; const opS=[];
      for(const tok of proc){
        if(tok.t==='num')outQ.push(tok.v);
        else if(tok.t==='const')outQ.push(tok.v==='pi'?Math.PI:(tok.v==='x'&&xVal!==null?xVal:Math.E));
        else if(tok.t==='fn'){opS.push(tok)}
        else if(tok.t==='op'){
          if(tok.v==='('){opS.push(tok)}
          else if(tok.v===')'){
            while(opS.length&&opS[opS.length-1].v!=='(')outQ.push(opS.pop());
            if(!opS.length)return{result:null,error:'Mismatched parentheses'};
            opS.pop();
            if(opS.length&&opS[opS.length-1].t==='fn')outQ.push(opS.pop());
          } else {
            while(opS.length){
              const top=opS[opS.length-1];
              if(top.t==='op'&&top.v!=='('&&(
                this.PREC[top.v]>this.PREC[tok.v]||
                (this.PREC[top.v]===this.PREC[tok.v]&&!this.RASSO.has(tok.v))
              ))outQ.push(opS.pop());
              else break;
            }
            opS.push(tok);
          }
        }
      }
      while(opS.length){const t=opS.pop();if(t.v==='(')return{result:null,error:'Mismatched parentheses'};outQ.push(t)}
      const stack=[];
      for(const item of outQ){
        if(typeof item==='number'){stack.push(item)}
        else if(item.t==='op'){
          const b=stack.pop()??0; const a=stack.pop()??0;
          switch(item.v){
            case'+':stack.push(a+b);break;
            case'-':stack.push(a-b);break;
            case'*':stack.push(a*b);break;
            case'/':if(b===0)return{result:null,error:'Division by Zero'};stack.push(a/b);break;
            case'%':return{result:null,error:'Use % as percent (e.g. 8%) or mod(a,b) for modulo'};
            case'^':stack.push(Math.pow(a,b));break;
            default:return{result:null,error:'Unknown op'};
          }
        } else if(item.t==='fn'){
          const a=stack.pop()??0;
          const fn=this.FNS[item.v];
          if(!fn)return{result:null,error:`Unknown fn: ${item.v}`};
          const r=fn(a);
          if(!isFinite(r))return{result:null,error:'Math Error'};
          stack.push(r);
        }
      }
      const result=stack[0]??0;
      if(!isFinite(result))return{result:null,error:'Overflow'};
      return{result,error:null};
    }catch(e){return{result:null,error:'Syntax Error'}}
  }
};

function memOp(op){
  if(op==='mc'){_s.memory=0;_s.memSet=false;toast('Memory cleared')}
  else if(op==='mr'){
    if(_s.memSet){
      const memStr=String(_s.memory);
      const ta=document.getElementById('expr-ta');
      if(ta){
        const start=ta.selectionStart||0;
        const end=ta.selectionEnd||0;
        const before=_s.expr.slice(0,start);
        const after=_s.expr.slice(end);
        _s.expr=before+memStr+after;
        ta.value=_s.expr;
        ta.selectionStart=ta.selectionEnd=start+memStr.length;
        ta.focus();
      } else {
        _s.expr=memStr;
      }
      _s.result=fmtR(_s.memory);
      _s.error=false;
      updateHighlight();
      updateDisplayOnly();
      _s.acItems=getAC(_s.expr);
      renderAC();
      if(!ta)render();
      return;
    } else {toast('Memory is empty');return;}
  }
  else if(op==='m+'||op==='m-'){
    if(_s.error){toast('Cannot store error in memory');return;}
    const cur=parseFloat(_s.result);
    if(isNaN(cur)){toast('Cannot store invalid value');return;}
    if(op==='m+'){_s.memory+=cur;_s.memSet=true;toast('M+ → '+fmtN(_s.memory,4))}
    else{_s.memory-=cur;_s.memSet=true;toast('M− → '+fmtN(_s.memory,4))}
  }
  renderMemBar();
}

function convertUnit(val,from,to,cat){
  if(cat==='temp'){
    let c;
    if(from==='°C')c=val;
    else if(from==='°F')c=(val-32)*5/9;
    else c=val-273.15;
    if(to==='°C')return c;
    if(to==='°F')return c*9/5+32;
    return c+273.15;
  }
  const tb=UNITS[cat].toBase;
  return val*tb[from]/tb[to];
}

// ══════════════════════════════════════════════
// EQUATION SOLVER
// ══════════════════════════════════════════════
function solveLinear(a,b){
  if(a===0)return b===0?'All real numbers':'No solution';
  return `x = ${fmtN(-b/a,6)}`;
}
function solveQuadratic(a,b,c){
  if(a===0)return`Linear: ${solveLinear(b,c)}`;
  const disc=b*b-4*a*c;
  if(disc<0)return`No real roots (Δ = ${fmtN(disc,4)})`;
  if(disc===0)return`x = ${fmtN(-b/(2*a),6)} (double root)`;
  const sq=Math.sqrt(disc);
  return`x₁ = ${fmtN((-b+sq)/(2*a),6)},  x₂ = ${fmtN((-b-sq)/(2*a),6)}`;
}
function solveCubic(a,b,c,d){
  if(a===0)return solveQuadratic(b,c,d);
  const f=x=>a*x**3+b*x**2+c*x+d;
  const fp=x=>3*a*x**2+2*b*x+c;
  const roots=new Set();
  for(let start=-20;start<=20;start+=2){
    let x=start;
    for(let i=0;i<200;i++){
      const fx=f(x);const fpx=fp(x);
      if(Math.abs(fpx)<1e-12)break;
      const nx=x-fx/fpx;
      if(Math.abs(nx-x)<1e-10){x=nx;break}
      x=nx;
    }
    if(Math.abs(f(x))<1e-6)roots.add(Math.round(x*1e6)/1e6);
  }
  if(!roots.size)return'No real roots found';
  return'x = '+[...roots].sort((a,b)=>a-b).map(v=>fmtN(v,6)).join(',  ');
}
function statsCalc(numStr){
  const nums=numStr.split(/[,\s]+/).map(Number).filter(n=>!isNaN(n));
  if(!nums.length)return null;
  const n=nums.length;
  const sum=nums.reduce((a,b)=>a+b,0);
  const mean=sum/n;
  const sorted=[...nums].sort((a,b)=>a-b);
  const median=n%2===0?(sorted[n/2-1]+sorted[n/2])/2:sorted[Math.floor(n/2)];
  const freq={};nums.forEach(v=>freq[v]=(freq[v]||0)+1);
  const maxF=Math.max(...Object.values(freq));
  const modes=Object.entries(freq).filter(([,f])=>f===maxF).map(([v])=>v);
  const variance=nums.reduce((a,b)=>a+(b-mean)**2,0)/n;
  const std=Math.sqrt(variance);
  const min=sorted[0];const max=sorted[n-1];
  return{n,sum,mean,median,modes,variance,std,min,max};
}

function highlight(expr){
  if(!expr)return'';
  const safe=expr.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return safe
    .replace(/(\d+\.?\d*([eE][+-]?\d+)?)/g,'<span class="syn-num">$1</span>')
    .replace(/\b(sqrt|cbrt|sin|cos|tan|asin|acos|atan|log2|log|ln|abs|ceil|floor|round|exp|fact|sign|trunc|pi|e)\b/g,'<span class="syn-fn">$1</span>')
    .replace(/([+\-*\/^%])/g,'<span class="syn-op">$1</span>')
    .replace(/([()])/g,'<span class="syn-paren">$1</span>');
}

  if(!wrap)return;
  let acEl=document.getElementById('autocomplete');
  if(!_s.acItems.length){if(acEl){acEl.remove();_s.activeAC=-1;}return;}
  if(!acEl){
    acEl=document.createElement('div');
    acEl.className='autocomplete';
    acEl.id='autocomplete';
    wrap.appendChild(acEl);
  }
  acEl.innerHTML=_s.acItems.map(([fn,hint],i)=>
    `<div class="ac-item ${i===_s.activeAC?'selected':''}" data-action="ac-pick" data-val="${esc(fn)}">${fn}<span class="ac-hint">${hint}</span></div>`
  ).join('');
}

// ══════════════════════════════════════════════
// PAREN MATCHING
// ══════════════════════════════════════════════
function parenBalance(expr){
  let open=0;
  for(const c of expr){if(c==='(')open++;else if(c===')')open--}
  return open;
}

// ══════════════════════════════════════════════
// VALIDATION
// ══════════════════════════════════════════════
function validate(expr){
  if(!expr)return{msg:'',cls:''};
  const bal=parenBalance(expr);
  if(bal>0)return{msg:`${bal} unclosed parenthes${bal>1?'es':'is'}`,cls:'warn'};
  if(bal<0)return{msg:'Too many closing parentheses',cls:'err'};
  if(/[+\-*\/^]$/.test(expr.trim()))return{msg:'Expression ends with an operator',cls:'warn'};
  const{error}=ME.evaluate(expr);
  if(error)return{msg:error,cls:'err'};
  return{msg:'✓ Valid expression',cls:'ok'};
}

// ══════════════════════════════════════════════
// FORMAT HELPERS
// ══════════════════════════════════════════════
function fmtR(n){
  if(n===null||n===undefined||isNaN(n))return'Error';
  if(Math.abs(n)>1e12||(Math.abs(n)<1e-7&&n!==0))return n.toExponential(4);
  return parseFloat(n.toPrecision(10)).toString();
}
function fmtN(n,dec=2){
  if(n===null||isNaN(n))return'—';
  return n.toLocaleString(undefined,{maximumFractionDigits:dec});
}
function esc(s){
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════
// GRAPH ENGINE — GraphEngine class
// Desmos-standard: adaptive subdivision +
// discontinuity detection + multi-graph support
// ══════════════════════════════════════════════

class GraphEngine {
  constructor(canvas, ME) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.ME = ME;

    this.graphs = new Map();
    // viewBox initialised from app state; updated by pan/zoom
    this.viewBox = { xMin: -10, xMax: 10, yMin: -10, yMax: 10 };

    this.pixelRatio = window.devicePixelRatio || 1;
    this._needsUpdate = true;
    this._renderPending = false;

    // Precision controls (Desmos-level)
    this.maxDepth = 12;

    this.colors = ['#7c6af7','#ec4899','#10b981','#f59e0b','#3b82f6'];

    this._resizeObserver = new ResizeObserver(() => this.resize());
    this._resizeObserver.observe(canvas);
    this.resize();
    this.setupInteractions();
  }

  // ── Helpers ──────────────────────────────────

  _niceStep(range, targetTicks) {
    const raw = range / targetTicks;
    const mag = Math.pow(10, Math.floor(Math.log10(Math.abs(raw) || 1)));
    const norm = raw / mag;
    const s = norm < 1.5 ? 1 : norm < 3.5 ? 2 : norm < 7.5 ? 5 : 10;
    return s * mag;
  }

  _colors() {
    const isDark = _s.theme === 'dark';
    return {
      bg:     isDark ? '#111118' : '#f8f8ff',
      grid:   isDark ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.07)',
      axis:   isDark ? 'rgba(255,255,255,.35)'  : 'rgba(0,0,0,.4)',
      label:  isDark ? 'rgba(200,200,230,.55)'  : 'rgba(60,60,100,.6)',
      origin: isDark ? 'rgba(124,106,247,.5)'   : 'rgba(124,106,247,.7)',
    };
  }

  xToPx(x, w) {
    return ((x - this.viewBox.xMin) / (this.viewBox.xMax - this.viewBox.xMin)) * w;
  }

  yToPy(y, h) {
    return h - ((y - this.viewBox.yMin) / (this.viewBox.yMax - this.viewBox.yMin)) * h;
  }

  pxToX(px, w) {
    return this.viewBox.xMin + (px / w) * (this.viewBox.xMax - this.viewBox.xMin);
  }

  pyToY(py, h) {
    return this.viewBox.yMax - (py / h) * (this.viewBox.yMax - this.viewBox.yMin);
  }

  // ── Resize ───────────────────────────────────

  resize() {
    const rect = this.canvas.getBoundingClientRect();
    this.canvas.width  = rect.width  * this.pixelRatio;
    this.canvas.height = rect.height * this.pixelRatio;
    this.ctx.setTransform(1, 0, 0, 1, 0, 0);
    this.ctx.scale(this.pixelRatio, this.pixelRatio);
    this.invalidate();
  }

  // ── Graph management ─────────────────────────

  /** Add or replace a graph. Returns the id. */
  setGraph(fn, type = 'explicit', opt = {}) {
    const id = opt.id || 'default';
    this.graphs.set(id, {
      fn, type,
      color: opt.color || this.colors[0],
      visible: true,
      segments: []
    });
    this.invalidate();
    return id;
  }

  clearGraphs() {
    this.graphs.clear();
    this.invalidate();
  }

  // ── Sampling ─────────────────────────────────

  // Rewrite bare sin/cos/tan → sinr/cosr/tanr so the graph always uses radians.
  // asin/acos/atan are also converted to their radian-output forms.
  // sinr/cosr/tanr pass-through untouched (user explicitly chose radians).
  // The calculator tabs are unaffected — they call ME.evaluate directly.
  _toRadFn(expr) {
    // Replace inverse trig FIRST so 'asin' isn't partially matched by /sin/.
    // asin/acos/atan → asinr/acosr/atanr (radian-output versions in ME.FNS).
    // sin/cos/tan  → sinr/cosr/tanr.
    // sinr/cosr/tanr already radians — the (?!r) lookahead leaves them alone.
    return expr
      .replace(/\basin\b/g,   'asinr')
      .replace(/\bacos\b/g,   'acosr')
      .replace(/\batan\b/g,   'atanr')
      .replace(/\bsin\b(?!r)/g, 'sinr')
      .replace(/\bcos\b(?!r)/g, 'cosr')
      .replace(/\btan\b(?!r)/g, 'tanr');
  }

  evalSafe(fn, x) {
    const radFn = this._toRadFn(fn);
    const { result, error } = this.ME.evaluate(radFn, x);
    if (error || result === null || result === undefined || !isFinite(result) || isNaN(result))
      return null;
    return result;
  }

  // Convert a math-space point to pixel space
  _toPx(x, y, w, h) {
    const { xMin, xMax, yMin, yMax } = this.viewBox;
    return [
      ((x - xMin) / (xMax - xMin)) * w,
      h - ((y - yMin) / (yMax - yMin)) * h
    ];
  }

  /**
   * Adaptive subdivision — all error thresholds in PIXEL space.
   * Returns array of {x,y} math-space points, or null on domain gap.
   * Discontinuity is detected AFTER subdivision at the caller level.
   */
  subdivide(fn, x1, y1, x2, y2, depth, w, h) {
    if (depth > this.maxDepth) {
      return [{ x: x1, y: y1 }, { x: x2, y: y2 }];
    }

    const midX = (x1 + x2) / 2;
    const midY = this.evalSafe(fn, midX);
    if (midY === null) return null; // domain gap inside this interval

    const [px1, py1] = this._toPx(x1, y1, w, h);
    const [px2, py2] = this._toPx(x2, y2, w, h);
    const [pxm, pym] = this._toPx(midX, midY, w, h);

    // How far is the actual midpoint from the straight-line midpoint in pixels?
    const errPx = Math.hypot(pxm - (px1+px2)/2, pym - (py1+py2)/2);

    if (errPx < 0.4) {
      // Flat enough — no refinement needed
      return [{ x: x1, y: y1 }, { x: x2, y: y2 }];
    }

    const left  = this.subdivide(fn, x1,   y1,   midX, midY, depth + 1, w, h);
    const right = this.subdivide(fn, midX, midY,  x2,   y2,  depth + 1, w, h);

    if (!left || !right) return null;

    // left[-1] == right[0] == midpoint, dedupe
    return [...left, ...right.slice(1)];
  }

  computeExplicit(fn) {
    const rect = this.canvas.getBoundingClientRect();
    const w = rect.width, h = rect.height;
    if (!w || !h) return [];

    const segments = [];
    const { xMin, xMax } = this.viewBox;

    // One coarse sample per ~2 pixels
    const base = Math.max(100, Math.ceil(w / 2));
    const dx = (xMax - xMin) / base;
    let current = [];

    const flush = () => { if (current.length >= 2) segments.push(current); current = []; };

    for (let i = 0; i < base; i++) {
      const x1 = xMin + i * dx;
      const x2 = x1 + dx;
      const y1 = this.evalSafe(fn, x1);
      const y2 = this.evalSafe(fn, x2);

      if (y1 === null || y2 === null) { flush(); continue; }

      const pts = this.subdivide(fn, x1, y1, x2, y2, 0, w, h);

      if (pts === null) { flush(); continue; }

      // Discontinuity check: pixel jump between last accepted point and new batch
      if (current.length > 0) {
        const last = current[current.length - 1];
        const [lpx, lpy] = this._toPx(last.x, last.y, w, h);
        const [fpx, fpy] = this._toPx(pts[0].x, pts[0].y, w, h);
        const dyPx = Math.abs(fpy - lpy);
        const dxPx = Math.abs(fpx - lpx);
        // Large vertical jump relative to canvas height and steeper than 45° → asymptote
        if (dyPx > h * 0.08 && dyPx > dxPx * 2) {
          flush();
        }
      }

      if (current.length === 0) {
        current.push(...pts);
      } else {
        current.push(...pts.slice(1)); // pts[0] duplicates current's last point
      }
    }

    flush();
    return segments;
  }


  computePolar(fn) {
    const pts = [];
    for (let t = 0; t <= Math.PI * 2; t += 0.01) {
      const r = this.evalSafe(fn, t);
      if (r === null) continue;
      pts.push({ x: r * Math.cos(t), y: r * Math.sin(t) });
    }
    return pts.length ? [pts] : [];
  }

  updateGraphs() {
    if (!this._needsUpdate) return;
    for (const g of this.graphs.values()) {
      if (!g.visible) continue;
      g.segments = g.type === 'explicit'
        ? this.computeExplicit(g.fn)
        : this.computePolar(g.fn);
    }
    this._needsUpdate = false;
  }

  // ── Auto Y-range ─────────────────────────────

  autoYRange(fn) {
    const { xMin, xMax } = this.viewBox;
    const N = 120;
    const yVals = [];
    for (let i = 0; i <= N; i++) {
      const x = xMin + (xMax - xMin) * i / N;
      const y = this.evalSafe(fn, x);
      if (y !== null) yVals.push(y);
    }
    if (yVals.length > 2) {
      yVals.sort((a, b) => a - b);
      const trim = Math.max(1, Math.floor(yVals.length * 0.05));
      const lo = yVals[trim], hi = yVals[yVals.length - 1 - trim];
      const pad = (hi - lo) * 0.15 || 2;
      this.viewBox.yMin = lo - pad;
      this.viewBox.yMax = hi + pad;
      if (this.viewBox.yMax - this.viewBox.yMin < 0.01) {
        this.viewBox.yMin -= 5; this.viewBox.yMax += 5;
      }
    } else {
      this.viewBox.yMin = -10; this.viewBox.yMax = 10;
    }
  }

  // ── Render ───────────────────────────────────

  invalidate() {
    this._needsUpdate = true;
    this.requestRender();
  }

  requestRender() {
    if (this._renderPending) return;
    this._renderPending = true;
    requestAnimationFrame(() => {
      this._renderPending = false;
      this.updateGraphs();
      this.render();
    });
  }

  render() {
    const rect = this.canvas.getBoundingClientRect();
    const w = rect.width, h = rect.height;
    if (!w || !h) return;

    const ctx = this.ctx;
    const col = this._colors();

    // Background
    ctx.fillStyle = col.bg;
    ctx.fillRect(0, 0, w, h);

    this.drawGrid(w, h, col);
    this.drawAxes(w, h, col);
    this.drawAxisLabels(w, h, col);

    // Clip curve drawing to canvas bounds
    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, w, h); ctx.clip();
    for (const g of this.graphs.values()) {
      if (g.visible) this.drawGraph(g, w, h);
    }
    ctx.restore();

    this.drawWatermark(w, h, col);
  }

  drawGrid(w, h, col) {
    const ctx = this.ctx;
    const { xMin, xMax, yMin, yMax } = this.viewBox;
    const xStep = this._niceStep(xMax - xMin, 8);
    const yStep = this._niceStep(yMax - yMin, 6);

    ctx.strokeStyle = col.grid;
    ctx.lineWidth = 1;
    ctx.beginPath();

    let xg = Math.ceil(xMin / xStep) * xStep;
    while (xg <= xMax) {
      const px = this.xToPx(xg, w);
      ctx.moveTo(px, 0); ctx.lineTo(px, h);
      xg += xStep;
    }
    let yg = Math.ceil(yMin / yStep) * yStep;
    while (yg <= yMax) {
      const py = this.yToPy(yg, h);
      ctx.moveTo(0, py); ctx.lineTo(w, py);
      yg += yStep;
    }
    ctx.stroke();
  }

  drawAxes(w, h, col) {
    const ctx = this.ctx;
    const ax0 = this.xToPx(0, w);
    const ay0 = this.yToPy(0, h);

    ctx.strokeStyle = col.axis;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    if (ax0 >= 0 && ax0 <= w) { ctx.moveTo(ax0, 0); ctx.lineTo(ax0, h); }
    if (ay0 >= 0 && ay0 <= h) { ctx.moveTo(0, ay0); ctx.lineTo(w, ay0); }
    ctx.stroke();

    // Origin dot
    if (ax0 >= 0 && ax0 <= w && ay0 >= 0 && ay0 <= h) {
      ctx.fillStyle = col.origin;
      ctx.beginPath(); ctx.arc(ax0, ay0, 2.5, 0, Math.PI * 2); ctx.fill();
    }
  }

  drawAxisLabels(w, h, col) {
    const ctx = this.ctx;
    const { xMin, xMax, yMin, yMax } = this.viewBox;
    const xStep = this._niceStep(xMax - xMin, 8);
    const yStep = this._niceStep(yMax - yMin, 6);
    const ax0 = this.xToPx(0, w);
    const ay0 = this.yToPy(0, h);
    const dpr = this.pixelRatio;

    ctx.fillStyle = col.label;
    ctx.font = `${10 * Math.min(dpr, 1.5)}px 'DM Mono',monospace`;

    // X labels
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    const labelY = Math.min(Math.max(ay0 + 4, 2), h - 14);
    let xg = Math.ceil(xMin / xStep) * xStep;
    while (xg <= xMax) {
      if (Math.abs(xg) > xStep * 0.1)
        ctx.fillText(parseFloat(xg.toPrecision(4)).toString(), this.xToPx(xg, w), labelY);
      xg += xStep;
    }

    // Y labels
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    const labelX = Math.min(Math.max(ax0 - 4, 22), w - 4);
    let yg = Math.ceil(yMin / yStep) * yStep;
    while (yg <= yMax) {
      if (Math.abs(yg) > yStep * 0.1)
        ctx.fillText(parseFloat(yg.toPrecision(4)).toString(), labelX, this.yToPy(yg, h));
      yg += yStep;
    }
  }

  drawGraph(g, w, h) {
    const ctx = this.ctx;
    ctx.strokeStyle = g.color;
    ctx.lineWidth = 2.2;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    for (const seg of g.segments) {
      if (seg.length < 2) continue;
      ctx.beginPath();
      ctx.moveTo(this.xToPx(seg[0].x, w), this.yToPy(seg[0].y, h));
      for (let i = 1; i < seg.length; i++) {
        ctx.lineTo(this.xToPx(seg[i].x, w), this.yToPy(seg[i].y, h));
      }
      ctx.stroke();
    }
  }

  drawWatermark(w, h, col) {
    const { xMin, xMax } = this.viewBox;
    this.ctx.fillStyle = col.label;
    this.ctx.font = `9px 'DM Mono',monospace`;
    this.ctx.textAlign = 'right';
    this.ctx.textBaseline = 'bottom';
    this.ctx.fillText(
      `[${parseFloat(xMin.toPrecision(4))}, ${parseFloat(xMax.toPrecision(4))}]`,
      w - 6, h - 4
    );
  }

  // ── Interaction (pan, zoom, pinch, dbl-click) ─

  setupInteractions() {
    const canvas = this.canvas;
    let dragging = false, last = { x: 0, y: 0 };
    let pinch = null;

    // Mouse drag
    canvas.addEventListener('mousedown', e => {
      dragging = true;
      last = { x: e.clientX, y: e.clientY };
    }, { passive: true });

    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      const rect = canvas.getBoundingClientRect();
      const dx = (e.clientX - last.x) / rect.width;
      const dy = (e.clientY - last.y) / rect.height;
      const xr = this.viewBox.xMax - this.viewBox.xMin;
      const yr = this.viewBox.yMax - this.viewBox.yMin;
      this.viewBox.xMin -= dx * xr; this.viewBox.xMax -= dx * xr;
      this.viewBox.yMin += dy * yr; this.viewBox.yMax += dy * yr;
      last = { x: e.clientX, y: e.clientY };
      this._syncInputs();
      this.invalidate();
    });

    window.addEventListener('mouseup', () => { dragging = false; });

    // Scroll zoom
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const f = e.deltaY > 0 ? 1.1 : 0.9;
      const rect = canvas.getBoundingClientRect();
      const mx = this.viewBox.xMin + (e.offsetX / rect.width)  * (this.viewBox.xMax - this.viewBox.xMin);
      const my = this.viewBox.yMax - (e.offsetY / rect.height) * (this.viewBox.yMax - this.viewBox.yMin);
      this.viewBox.xMin = mx - (mx - this.viewBox.xMin) * f;
      this.viewBox.xMax = mx + (this.viewBox.xMax - mx) * f;
      this.viewBox.yMin = my - (my - this.viewBox.yMin) * f;
      this.viewBox.yMax = my + (this.viewBox.yMax - my) * f;
      this._syncInputs();
      this.invalidate();
    }, { passive: false });

    // Touch pan
    canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        dragging = true;
        last = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      } else if (e.touches.length === 2) {
        dragging = false;
        pinch = {
          dist: Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          ),
          vb: { ...this.viewBox }
        };
      }
    }, { passive: true });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (dragging && e.touches.length === 1) {
        const rect = canvas.getBoundingClientRect();
        const dx = (e.touches[0].clientX - last.x) / rect.width;
        const dy = (e.touches[0].clientY - last.y) / rect.height;
        const xr = this.viewBox.xMax - this.viewBox.xMin;
        const yr = this.viewBox.yMax - this.viewBox.yMin;
        this.viewBox.xMin -= dx * xr; this.viewBox.xMax -= dx * xr;
        this.viewBox.yMin += dy * yr; this.viewBox.yMax += dy * yr;
        last = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        this._syncInputs();
        this.invalidate();
      } else if (pinch && e.touches.length === 2) {
        const d = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        const f = pinch.dist / d;
        const cx = (pinch.vb.xMin + pinch.vb.xMax) / 2;
        const cy = (pinch.vb.yMin + pinch.vb.yMax) / 2;
        const hw = (pinch.vb.xMax - pinch.vb.xMin) / 2 * f;
        const hh = (pinch.vb.yMax - pinch.vb.yMin) / 2 * f;
        this.viewBox.xMin = cx - hw; this.viewBox.xMax = cx + hw;
        this.viewBox.yMin = cy - hh; this.viewBox.yMax = cy + hh;
        this._syncInputs();
        this.invalidate();
      }
    }, { passive: false });

    canvas.addEventListener('touchend', () => { dragging = false; pinch = null; }, { passive: true });

    // Double-click to reset
    canvas.addEventListener('dblclick', () => {
      this.viewBox = { xMin: -10, xMax: 10, yMin: -10, yMax: 10 };
      _s.graphXmin = -10; _s.graphXmax = 10;
      const xminEl = document.getElementById('graph-xmin');
      const xmaxEl = document.getElementById('graph-xmax');
      if (xminEl) xminEl.value = -10;
      if (xmaxEl) xmaxEl.value = 10;
      this.autoYRange(_s.graphFn);
      this.invalidate();
    }, { passive: true });
  }

  /** Push current viewBox back into the x-range input fields + app state. */
  _syncInputs() {
    _s.graphXmin = this.viewBox.xMin;
    _s.graphXmax = this.viewBox.xMax;
    const xminEl = document.getElementById('graph-xmin');
    const xmaxEl = document.getElementById('graph-xmax');
    if (xminEl) xminEl.value = parseFloat(this.viewBox.xMin.toPrecision(5));
    if (xmaxEl) xmaxEl.value = parseFloat(this.viewBox.xMax.toPrecision(5));
  }
}

// ── Singleton instance ───────────────────────
let _ge = null; // GraphEngine instance, created lazily

/**
 * drawGraph() — thin shim called by all existing event handlers.
 * Creates/reuses the GraphEngine singleton, syncs from app state, plots.
 */
function drawGraph() {
  const canvas = document.getElementById('graph-canvas');
  if (!canvas) return;

  // Create engine once per canvas element (canvas is replaced on tab switch)
  if (!_ge || _ge.canvas !== canvas) {
    _ge = new GraphEngine(canvas, ME);
  }

  // Sync viewBox x-range from app state (unless user is mid-pan)
  _ge.viewBox.xMin = _s.graphXmin;
  _ge.viewBox.xMax = _s.graphXmax;

  // Auto-fit Y unless the user has manually panned/zoomed Y
  if (!_ge._userZoomedY) {
    _ge.autoYRange(_s.graphFn);
  }

  // Register the current function as the sole graph
  _ge.setGraph(_s.graphFn, 'explicit', { id: 'main', color: '#7c6af7' });
  // setGraph already calls invalidate → requestRender
}

function renderNav(){

  ).join('');
}

  if(!el)return;
  el.querySelector('.mem-val').textContent=_s.memSet?`M = ${fmtN(_s.memory,4)}`:'M: —';
}

// FIX: Separated display update from full render to preserve textarea focus/cursor
function updateDisplayOnly(){
  const disp=document.getElementById('disp-val');
  if(disp){
    disp.textContent=_s.result;
    disp.className='display-value'+(_s.error?' error':'');
  }
  const vm=document.querySelector('.validation-msg');
  if(vm){const v=validate(_s.expr);vm.textContent=v.msg;vm.className='validation-msg '+v.cls;}
  const ph=document.querySelector('.paren-hint');
  const bal=parenBalance(_s.expr);
  if(ph){
    ph.style.display=bal>0?'block':'none';
    if(bal>0)ph.textContent=`Missing ${bal} closing )`;
  }
  const rea=document.querySelector('.display-reasoning');
  if(rea){rea.textContent=_s.reasoning&&!_s.error?`→ ${_s.reasoning}`:'';rea.style.display=_s.reasoning&&!_s.error?'block':'none';}
}

// ══════════════════════════════════════════════
// EDITOR EVENTS (textarea)
// FIX: No longer calls renderMain() on input — only updates affected DOM nodes
// ══════════════════════════════════════════════
function attachEditorEvents(){
  const ta=document.getElementById('expr-ta');
  if(!ta)return;

  ta.addEventListener('input',()=>{
    _s.expr=ta.value;
    _s.acItems=getAC(_s.expr);
    _s.activeAC=-1;
    // live preview — only evaluate, don't re-render
    if(_s.expr.trim()){
      const{result}=ME.evaluate(_s.expr);
      if(result!==null)_s.result=fmtR(result);
    } else {
      _s.result='0';
    }
    _s.error=false;
    updateHighlight();
    updateDisplayOnly();
    renderAC(); // FIX: only update AC dropdown, not full render
  });

  ta.addEventListener('keydown',e=>{
    const ac=_s.acItems;
    if(ac.length){
      if(e.key==='ArrowDown'){e.preventDefault();_s.activeAC=Math.min(_s.activeAC+1,ac.length-1);updateACHighlight();return}
      if(e.key==='ArrowUp'){e.preventDefault();_s.activeAC=Math.max(_s.activeAC-1,-1);updateACHighlight();return}
      if((e.key==='Tab'||e.key==='Enter')&&_s.activeAC>=0){e.preventDefault();applyAC(ac[_s.activeAC][0]);return}
      if(e.key==='Escape'){_s.acItems=[];renderAC();return}
    }
    // history nav
    if(e.key==='ArrowUp'&&!ac.length){
      e.preventDefault();
      if(_s.exprHistIdx<_s.exprHistory.length-1){
        _s.exprHistIdx++;
        _s.expr=_s.exprHistory[_s.exprHistIdx];
        ta.value=_s.expr;
        ta.dispatchEvent(new Event('input'));
      }
    }
    if(e.key==='ArrowDown'&&!ac.length){
      e.preventDefault();
      if(_s.exprHistIdx>0){
        _s.exprHistIdx--;
        _s.expr=_s.exprHistory[_s.exprHistIdx];
        ta.value=_s.expr;
        ta.dispatchEvent(new Event('input'));
      } else if(_s.exprHistIdx===0){
        _s.exprHistIdx=-1;
        _s.expr='';
        ta.value='';
        ta.dispatchEvent(new Event('input'));
      }
    }
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();computeExpr();}
  });
}

function updateACHighlight(){
  document.querySelectorAll('.ac-item').forEach((el,i)=>el.classList.toggle('selected',i===_s.activeAC));
}

function applyAC(fn){
  const ta=document.getElementById('expr-ta');
  if(!ta)return;
  const m=_s.expr.match(/[a-z]*$/i);
  const prefix=m?m[0]:'';
  _s.expr=_s.expr.slice(0,-prefix.length)+fn;
  _s.acItems=[];_s.activeAC=-1;
  ta.value=_s.expr;
  ta.dispatchEvent(new Event('input'));
  ta.focus();
  ta.selectionStart=ta.selectionEnd=_s.expr.length;
}

// ══════════════════════════════════════════════
// CALC ACTIONS
// ══════════════════════════════════════════════
function addToHistory(expr,val){
  if(!val||val==='0'||val==='Error')return;
  const entry={expr:expr.length>22?expr.slice(0,22)+'…':expr,val};
  _s.history=[entry,..._s.history].slice(0,10);
  saveLS('sc3_hist',_s.history);
  _s.exprHistory=[expr,..._s.exprHistory].slice(0,50);
  _s.exprHistIdx=-1;
}

function computeExpr(){
  const expr=_s.expr.trim();
  if(!expr)return;
  const{result,error}=ME.evaluate(expr);
  _s.error=!!error;
  if(error){_s.result=error;_s.reasoning=''}
  else{
    const fmt=fmtR(result);
    _s.result=fmt;_s.reasoning=`${expr} = ${fmt}`;
    addToHistory(expr,fmt);
  }
  _s.justEvaled=true;
  render();
}

// FIX: handleKey — unified, called from both button clicks and keyboard
// Properly manages justEvaled so typing a digit after = starts fresh
function handleKey(val){
  if(_s.justEvaled&&/^\d$/.test(val)){
    _s.expr=val;
    _s.justEvaled=false;
  } else {
    _s.expr+=val;
    _s.justEvaled=false;
  }
  const{result}=ME.evaluate(_s.expr);
  if(result!==null)_s.result=fmtR(result);
  _s.error=false;

  // FIX: update textarea value and highlight without full re-render
  const ta=document.getElementById('expr-ta');
  if(ta){
    ta.value=_s.expr;
    updateHighlight();
    updateDisplayOnly();
    _s.acItems=getAC(_s.expr);
    renderAC();
    ta.focus();
    ta.selectionStart=ta.selectionEnd=_s.expr.length;
  } else {
    render();
  }
}

let utilTimer;
function computeUtil(){
  clearTimeout(utilTimer);
  utilTimer=setTimeout(()=>{
    const m=_s.mode;let res,lbl,formula;
    if(m==='loan'){
      const P=+document.getElementById('u-p')?.value||0;
      const r=+document.getElementById('u-r')?.value||0;
      const n=+document.getElementById('u-n')?.value||0;
      if(!P||!n){setUtil('—','Monthly EMI','Enter all values');return}
      const mr=r/1200;
      const emi=mr===0?P/n:(P*mr*Math.pow(1+mr,n))/(Math.pow(1+mr,n)-1);
      const total=emi*n; const interest=total-P;
      res=fmtN(emi);lbl='Monthly EMI';
      formula=`Total: ${fmtN(total)} | Interest: ${fmtN(interest)} | P·R·(1+R)^N ÷ [(1+R)^N−1]`;
      addToHistory('Loan EMI',fmtN(emi));
    } else if(m==='tax'){
      const i=+document.getElementById('u-i')?.value||0;
      const r=+document.getElementById('u-r')?.value||0;
      if(!i){setUtil('—','Take-home Pay','Enter income');return}
      const tax=i*(r/100);const net=i-tax;
      res=fmtN(net);lbl='Take-home Pay';formula=`Tax: ${fmtN(tax)} | Rate: ${r}% | Income−Tax`;
      addToHistory('Tax',fmtN(net));
    } else if(m==='tip'){
      const b=+document.getElementById('u-b')?.value||0;
      const t=+document.getElementById('u-t')?.value||15;
      const pp=+document.getElementById('u-pp')?.value||1;
      if(!b){setUtil('—','Per Person','Enter bill');return}
      const tip=b*(t/100);const total=b+tip;const perp=total/pp;
      res=fmtN(perp);lbl=`Each of ${pp} pays`;formula=`Tip: ${fmtN(tip)} | Total: ${fmtN(total)} | (Bill+Tip)÷People`;
      addToHistory('Tip split',fmtN(perp));
    }
    setUtil(res,lbl,formula);
    const hl=document.querySelector('.history-card');
    if(hl)hl.outerHTML=renderHistoryHTML();
  },150);
}

function setUtil(num,lbl,formula){
  const el=document.getElementById('util-result');
  if(!el)return;
  el.querySelector('.res-num').textContent=num;
  el.querySelector('.res-lbl').textContent=lbl;
  el.querySelector('.res-formula').textContent=formula;
}

function computeUnit(){
  const val=parseFloat(document.getElementById('u-val')?.value);
  const from=document.getElementById('u-from')?.value;
  const to=document.getElementById('u-to')?.value;
  const el=document.getElementById('unit-result');
  if(!el)return;
  if(isNaN(val)){el.querySelector('.res-num').textContent='—';el.querySelector('.res-lbl').textContent='Enter a value';return}
  const result=convertUnit(val,from,to,_s.unitCat);
  el.querySelector('.res-num').textContent=fmtN(result,6);
  el.querySelector('.res-lbl').textContent=`${fmtN(val,6)} ${from} = ${fmtN(result,6)} ${to}`;
}

function solveEq(){
  const t=_s.eqType;
  const g=id=>{const el=document.getElementById(id);return el?parseFloat(el.value)||0:0};
  let res='';let formula='';
  if(t==='linear'){res=solveLinear(g('eq-a'),g('eq-b'));formula='ax + b = 0'}
  else if(t==='quadratic'){res=solveQuadratic(g('eq-a'),g('eq-b'),g('eq-c'));formula='ax² + bx + c = 0'}
  else if(t==='cubic'){res=solveCubic(g('eq-a'),g('eq-b'),g('eq-c'),g('eq-d'));formula='ax³ + bx² + cx + d = 0'}
  const rn=document.getElementById('eq-res-num');
  const rf=document.getElementById('eq-res-formula');
  if(rn)rn.textContent=res;
  if(rf)rf.textContent=formula;
  addToHistory(formula,res.split(',')[0]);
  const hl=document.querySelector('.history-card');
  if(hl)hl.outerHTML=renderHistoryHTML();
}

function updateStats(){
  const inp=document.getElementById('eq-stats');
  if(!inp)return;
  const st=statsCalc(inp.value);
  const grid=document.getElementById('stats-grid');
  if(!grid)return;
  if(!st){grid.innerHTML='<div class="hist-empty" style="grid-column:1/-1">Enter numbers above</div>';return}
  grid.innerHTML=[
    ['Count',st.n],['Sum',fmtN(st.sum,4)],['Mean',fmtN(st.mean,4)],['Median',fmtN(st.median,4)],
    ['Mode',st.modes.join(', ')],['Std Dev',fmtN(st.std,4)],['Variance',fmtN(st.variance,4)],
    ['Min',fmtN(st.min,4)],['Max',fmtN(st.max,4)],['Range',fmtN(st.max-st.min,4)]
  ].map(([l,v])=>`<div class="stat-box"><div class="stat-lbl">${l}</div><div class="stat-val">${v}</div></div>`).join('');
}

function calcFormula(idx){
  const f=FORMULAS[_s.formulaCat][idx];
  if(!f)return;
  const vals={};
  let hasEmpty=false;
  document.querySelectorAll('.fml-var').forEach(el=>{
    const v=el.value.trim();
    if(v==='')hasEmpty=true;
    vals[el.dataset.var]=parseFloat(v)||0;
  });
  const box=document.getElementById(`fml-result-${idx}`);
  if(!box)return;
  box.style.display='block';
  if(hasEmpty){
    box.querySelector('.res-num').textContent='—';
    box.querySelector('.res-formula').textContent='Fill in all fields';
    return;
  }
  let expr=f.expr;
  Object.entries(vals).forEach(([k,v])=>{expr=expr.replace(new RegExp(`\b${k}\b`,'g'),`(${v})`)});
  const{result,error}=ME.evaluate(expr);
  box.querySelector('.res-num').textContent=error?'Error':fmtN(result,6);
  box.querySelector('.res-formula').textContent=error||`${f.expr}`;
  if(!error)addToHistory(f.name,fmtN(result,4));
  const hl=document.querySelector('.history-card');
  if(hl)hl.outerHTML=renderHistoryHTML();
}

  const dispEl=document.getElementById('disp-val');
  const utilEl=document.querySelector('.res-num');
  const text=((dispEl??utilEl)?.textContent??_s.result).trim();
  const doIt=t=>{
    const ta=document.createElement('textarea');
    ta.value=t;ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand('copy');toast('Copied: '+t)}
    catch{toast('Could not copy')}
    document.body.removeChild(ta);
  };
  if(navigator.clipboard?.writeText)navigator.clipboard.writeText(text).then(()=>toast('Copied: '+text)).catch(()=>doIt(text));
  else doIt(text);
}

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2000);
}

// ══════════════════════════════════════════════
// EVENTS
// FIX: 'key' and 'fn' both route through handleKey() consistently
// FIX: Removed duplicate 'ac' case
// ══════════════════════════════════════════════
function bindEvents(){
  document.addEventListener('click',e=>{
    const el=e.target.closest('[data-action]');
    if(!el)return;
    const a=el.dataset.action;const v=el.dataset.val??'';
    switch(a){
      case'set-mode':
        _s.mode=v;_s.expr='';_s.result='0';_s.reasoning='';_s.error=false;_s.justEvaled=false;_s.acItems=[];
        render();break;
      case'toggle-theme':
        _s.theme=_s.theme==='dark'?'light':'dark';
        document.body.setAttribute('data-theme',_s.theme);
        saveLS('sc3_theme',_s.theme);
        if(_s.mode==='graph'&&_ge) setTimeout(()=>_ge.invalidate(),50);
        break;
      case'copy-result':copyResult();break;
      // FIX: 'key' and 'fn' now both call handleKey() which manages all state correctly
      case'key':
        handleKey(v);break;
      case'fn':
        _s.justEvaled=false;
        handleKey(v);break;
      case'ac-pick':applyAC(v);break;
      case'del':
        _s.expr=_s.expr.slice(0,-1);
        _s.error=false;
        if(!_s.expr)_s.result='0';
        {const ta=document.getElementById('expr-ta');
        if(ta){ta.value=_s.expr;updateHighlight();updateDisplayOnly();_s.acItems=getAC(_s.expr);renderAC();ta.focus();ta.selectionStart=ta.selectionEnd=_s.expr.length;}
        else render();}
        break;
      case'sign':
        _s.expr=_s.expr.startsWith('-')?_s.expr.slice(1):'-'+(_s.expr||'0');
        {const ta=document.getElementById('expr-ta');
        if(ta){ta.value=_s.expr;updateHighlight();updateDisplayOnly();ta.focus();}
        else render();}
        break;
      case'ac':_s.expr='';_s.result='0';_s.reasoning='';_s.error=false;_s.justEvaled=false;_s.acItems=[];
        render();
        setTimeout(()=>{const ta=document.getElementById('expr-ta');if(ta)ta.focus();},0);
        break;
      case'eq':computeExpr();break;
      case'mem':memOp(v);break;
      case'clear-history':_s.history=[];saveLS('sc3_hist',[]);render();break;
      case'recall-hist':{
        const h=_s.history[parseInt(v)];
        if(h&&(_s.mode==='general'||_s.mode==='scientific')){
          _s.expr=h.val;_s.result=h.val;_s.justEvaled=false;
          render();
          setTimeout(()=>{const ta=document.getElementById('expr-ta');if(ta){ta.focus();ta.selectionStart=ta.selectionEnd=_s.expr.length}},0);
        }
        break;}
      case'graph-draw':
        _s.graphFn=document.getElementById('graph-fn')?.value||'sin(x)';
        _s.graphXmin=parseFloat(document.getElementById('graph-xmin')?.value)||-10;
        _s.graphXmax=parseFloat(document.getElementById('graph-xmax')?.value)||10;
        if(_ge){ _ge._userZoomedY=false; _ge.viewBox.xMin=_s.graphXmin; _ge.viewBox.xMax=_s.graphXmax; }
        drawGraph();break;
      case'graph-reset':
        _s.graphXmin=-10;_s.graphXmax=10;
        if(_ge){ _ge._userZoomedY=false; _ge.viewBox={xMin:-10,xMax:10,yMin:-10,yMax:10}; }
        const gxmin=document.getElementById('graph-xmin');const gxmax=document.getElementById('graph-xmax');
        if(gxmin)gxmin.value=-10;if(gxmax)gxmax.value=10;drawGraph();break;
      case'unit-cat':_s.unitCat=v;render();break;
      case'unit-swap':{
        const uf=document.getElementById('u-from');const ut=document.getElementById('u-to');
        if(uf&&ut){const tmp=uf.value;uf.value=ut.value;ut.value=tmp;computeUnit();}break;}
      case'eq-type':_s.eqType=v;_s.activeFormula=null;render();break;
      case'solve-eq':solveEq();break;
      case'fml-cat':_s.formulaCat=v;_s.activeFormula=null;render();break;
      case'fml-select':
        _s.activeFormula=_s.activeFormula===parseInt(v)?null:parseInt(v);render();break;
      case'fml-calc':calcFormula(parseInt(v));break;
    }
  });

  // keyboard global
  document.addEventListener('keydown',e=>{
    if(!['general','scientific'].includes(_s.mode))return;
    const ta=document.getElementById('expr-ta');
    const active=document.activeElement;
    if(active===ta||active?.tagName==='INPUT'||active?.tagName==='TEXTAREA')return;
    const allowed='0123456789.+-*/^%()';
    if(allowed.includes(e.key)){e.preventDefault();handleKey(e.key)}
    else if(e.key==='Enter'){e.preventDefault();computeExpr()}
    else if(e.key==='Backspace'){
      e.preventDefault();
      _s.expr=_s.expr.slice(0,-1);_s.error=false;
      if(!_s.expr)_s.result='0';
      if(ta){ta.value=_s.expr;updateHighlight();updateDisplayOnly();ta.focus();}
      else render();
    }
    else if(e.key==='Escape'){
      e.preventDefault();_s.expr='';_s.result='0';_s.reasoning='';_s.error=false;render();
    }
  });

  // util inputs
  let utilDebounce;
  document.addEventListener('input',e=>{
    if(e.target.id==='expr-ta')return; // handled by attachEditorEvents
    if(e.target.closest('.card')){
      clearTimeout(utilDebounce);
      if(['loan','tax','tip'].includes(_s.mode)){utilDebounce=setTimeout(computeUtil,150)}
      if(_s.mode==='units'){utilDebounce=setTimeout(computeUnit,150)}
      if(_s.mode==='equations'&&_s.eqType==='stats'){utilDebounce=setTimeout(updateStats,150)}
    }
  });

  // graph enter key
  document.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&_s.mode==='graph'){
      const gf=document.getElementById('graph-fn');
      if(document.activeElement===gf){
        _s.graphFn=gf.value;
        _s.graphXmin=parseFloat(document.getElementById('graph-xmin')?.value)||-10;
        _s.graphXmax=parseFloat(document.getElementById('graph-xmax')?.value)||10;
        drawGraph();
      }
    }
  });

  // resize graph
  window.addEventListener('resize',()=>{if(_s.mode==='graph'&&_ge)_ge.invalidate()});
}

// ══════════════════════════════════════════════
// PWA — Service Worker registration
// ══════════════════════════════════════════════
let deferredPWAPrompt=null;
function setupPWA(){
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    deferredPWAPrompt=e;
    const banner=document.getElementById('pwa-banner');
    if(banner)banner.classList.add('visible');
  });
  const btn=document.getElementById('pwa-install-btn');
  if(btn){
    btn.addEventListener('click',()=>{
      if(!deferredPWAPrompt)return;
      deferredPWAPrompt.prompt();
      deferredPWAPrompt.userChoice.then(()=>{
        deferredPWAPrompt=null;
        const banner=document.getElementById('pwa-banner');
        if(banner)banner.classList.remove('visible');
      });
    });
  }
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function init(){
  setupPWA();
  const savedTheme=loadLS('sc3_theme','dark');
  _s.theme=savedTheme;
  document.body.setAttribute('data-theme',savedTheme);
  bindEvents();
  render();
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
}

return{init};
})();

document.addEventListener('DOMContentLoaded',App.init);
</script>
